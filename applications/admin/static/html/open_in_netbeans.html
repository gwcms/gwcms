<style>.openfile, .openfile1{ cursor:pointer } .backtracerequest{ color: red }</style>
<script>
function OpenInNetbeans(file, line)
{
	var url = new URL('http://localhost/gw/tools/netbeanopen/nb_open.php');
	url.searchParams.set('file', file);
	url.searchParams.set('line', line);

	fetch(url).then(function(response) {
		return response.text();
	}).then(function(data) {
		console.log(data);
	});
}

document.addEventListener('click', function(event) {
	var link = event.target.closest('.openfile1, .openfile');
	if (!link) {
		return;
	}

	var file;
	var line;

	if (link.classList.contains('openfile1')) {
		file = link.dataset.file;
		line = link.dataset.line;
	} else {
		var arg = link.innerText.split(':');
		file = arg[0].split(' ')[0];
		line = arg[1].split(' ')[1];
	}

	OpenInNetbeans(file.replace(prodloc, devloc), line);
});

</script>
